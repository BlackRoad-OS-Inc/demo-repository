name: Stripe Integration Tests
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        env:
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          STRIPE_PRICE_STARTER: price_starter_ci
          STRIPE_PRICE_PROFESSIONAL: price_professional_ci
          STRIPE_PRICE_ENTERPRISE: price_enterprise_ci
        run: npm run test:ci
